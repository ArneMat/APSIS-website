<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="200" height="200">
  <title>APSIS International — Badge / Icon</title>
  <desc>Standalone orbital mark. For use as favicon, social media avatar, or document corner badge.</desc>

  <!-- Background with rounded corners — remove rect for transparent use -->
  <rect width="100" height="100" fill="#1A1A2E" rx="10"/>

  <!-- ═══════════════════════════════════ -->
  <!--  ORBITAL MARK (scaled for badge)    -->
  <!--  rx=30, ry=16 — fits within bounds  -->
  <!-- ═══════════════════════════════════ -->
  <g transform="translate(50 50) rotate(-15)">

    <!-- Apsidal axis -->
    <line x1="-30" y1="0" x2="30" y2="0"
          stroke="white" stroke-width="0.6"
          stroke-dasharray="1.5 3" opacity="0.08"/>

    <!-- Orbital path ellipse -->
    <ellipse cx="0" cy="0" rx="30" ry="16"
             fill="none" stroke="white" stroke-width="1.2" opacity="0.18"/>

    <!-- Apoapsis — ghost element -->
    <circle cx="-30" cy="0" r="2.5" fill="white" opacity="0.18"/>

    <!-- Periapsis — critical point with concentric rings -->
    <circle cx="30" cy="0" r="13"  fill="none" stroke="#4A9EE8" stroke-width="0.5" opacity="0.10"/>
    <circle cx="30" cy="0" r="8.5" fill="none" stroke="#4A9EE8" stroke-width="0.7" opacity="0.22"/>
    <circle cx="30" cy="0" r="5"   fill="none" stroke="#4A9EE8" stroke-width="0.9" opacity="0.45"/>
    <circle cx="30" cy="0" r="2.8" fill="#4A9EE8"/>
    <circle cx="30" cy="0" r="1.1" fill="white"/>

  </g>

</svg>
