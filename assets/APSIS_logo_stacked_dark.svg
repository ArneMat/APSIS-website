<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="400" height="400">
  <title>APSIS International — Stacked Lockup (Dark)</title>
  <desc>Stacked lockup for website header and square format use. Dark variant.</desc>

  <!-- Background — remove rect to use on transparent/custom backgrounds -->
  <rect width="200" height="200" fill="#1A1A2E"/>

  <!-- ═══════════════════════════════════ -->
  <!--  ORBITAL MARK (centred, upper half) -->
  <!-- ═══════════════════════════════════ -->
  <g transform="translate(100 82) rotate(-15)">

    <!-- Apsidal axis -->
    <line x1="-38" y1="0" x2="38" y2="0"
          stroke="white" stroke-width="0.6"
          stroke-dasharray="2 3.5" opacity="0.08"/>

    <!-- Orbital path ellipse -->
    <ellipse cx="0" cy="0" rx="38" ry="20"
             fill="none" stroke="white" stroke-width="1.2" opacity="0.18"/>

    <!-- Apoapsis — ghost element -->
    <circle cx="-38" cy="0" r="3" fill="white" opacity="0.18"/>

    <!-- Periapsis — critical point with concentric rings -->
    <!-- Note: outermost ring capped so it remains within canvas -->
    <circle cx="38" cy="0" r="16"  fill="none" stroke="#4A9EE8" stroke-width="0.5" opacity="0.10"/>
    <circle cx="38" cy="0" r="10"  fill="none" stroke="#4A9EE8" stroke-width="0.7" opacity="0.22"/>
    <circle cx="38" cy="0" r="6"   fill="none" stroke="#4A9EE8" stroke-width="0.9" opacity="0.45"/>
    <circle cx="38" cy="0" r="3.2" fill="#4A9EE8"/>
    <circle cx="38" cy="0" r="1.3" fill="white"/>

  </g>

  <!-- Horizontal separator -->
  <line x1="30" y1="140" x2="170" y2="140"
        stroke="#4A9EE8" stroke-width="0.75" opacity="0.22"/>

  <!-- ═══════════════════════════════════ -->
  <!--  WORDMARK (lower half, centred)     -->
  <!-- ═══════════════════════════════════ -->

  <!-- APSIS -->
  <text x="100" y="163"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="26" font-weight="700"
        fill="white" letter-spacing="5.5"
        text-anchor="middle">APSIS</text>

  <!-- INTERNATIONAL -->
  <text x="100" y="178"
        font-family="Arial, 'Helvetica Neue', Helvetica, sans-serif"
        font-size="9" font-weight="400"
        fill="#4A9EE8" letter-spacing="3.5"
        text-anchor="middle">INTERNATIONAL</text>

</svg>
